<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 10px; }
      .value { font-family: Arial, sans-serif; font-size: 9px; font-weight: bold; }
    </style>
  </defs>
  <rect width="700" height="400" fill="white"/>
  
  <!-- Title -->
  <text x="350" y="25" class="title" text-anchor="middle">Retained vs. Forgotten Performance by Model</text>
  
  <!-- ========== GRADE 4 SECTION ========== -->
  <text x="175" y="60" class="label" text-anchor="middle" font-weight="bold">Grade 4</text>
  
  <!-- Y-axis -->
  <line x1="50" y1="80" x2="50" y2="280" stroke="#333" stroke-width="1"/>
  <text x="25" y="180" class="label" text-anchor="middle" transform="rotate(-90, 25, 180)">Relative Accuracy (%)</text>
  <text x="40" y="85" class="label" text-anchor="end">100</text>
  <text x="40" y="140" class="label" text-anchor="end">50</text>
  <text x="40" y="280" class="label" text-anchor="end">0</text>
  <line x1="48" y1="82" x2="52" y2="82" stroke="#333"/>
  <line x1="48" y1="137" x2="52" y2="137" stroke="#333"/>
  <line x1="48" y1="278" x2="52" y2="278" stroke="#333"/>
  <line x1="50" y1="82" x2="320" y2="82" stroke="#eee"/>
  <line x1="50" y1="137" x2="320" y2="137" stroke="#eee"/>
  <line x1="50" y1="217" x2="320" y2="217" stroke="#eee"/>
  
  <!-- Grade 4 - Claude -->
  <rect x="70" y="88" width="50" height="18" fill="#2166ac" rx="2"/>
  <text x="95" y="101" fill="white" class="value">98.2%</text>
  <rect x="70" y="248" width="12" height="18" fill="#b2182b" rx="2"/>
  <text x="150" y="165" class="label">Claude</text>
  
  <!-- Grade 4 - DeepSeek -->
  <rect x="180" y="93" width="50" height="18" fill="#2166ac" rx="2"/>
  <text x="205" y="106" fill="white" class="value">93.8%</text>
  <rect x="180" y="233" width="22" height="18" fill="#f4a582" rx="2"/>
  <text x="260" y="165" class="label">DeepSeek</text>
  
  <!-- Grade 4 - GPT-4o -->
  <rect x="290" y="100" width="50" height="18" fill="#2166ac" rx="2"/>
  <text x="315" y="113" fill="white" class="value">84.9%</text>
  <rect x="290" y="224" width="32" height="18" fill="#f4a582" rx="2"/>
  
  <!-- X-axis line -->
  <line x1="50" y1="280" x2="350" y2="280" stroke="#333" stroke-width="1"/>
  
  <!-- ========== GRADE 5 SECTION ========== -->
  <text x="525" y="60" class="label" text-anchor="middle" font-weight="bold">Grade 5</text>
  
  <!-- Y-axis -->
  <line x1="400" y1="80" x2="400" y2="280" stroke="#333" stroke-width="1"/>
  <text x="375" y="180" class="label" text-anchor="middle" transform="rotate(-90, 375, 180)">Relative Accuracy (%)</text>
  <text x="390" y="85" class="label" text-anchor="end">100</text>
  <text x="390" y="140" class="label" text-anchor="end">50</text>
  <text x="390" y="280" class="label" text-anchor="end">0</text>
  <line x1="398" y1="82" x2="402" y2="82" stroke="#333"/>
  <line x1="398" y1="137" x2="402" y2="137" stroke="#333"/>
  <line x1="398" y1="278" x2="402" y2="278" stroke="#333"/>
  <line x1="400" y1="82" x2="670" y2="82" stroke="#eee"/>
  <line x1="400" y1="137" x2="670" y2="137" stroke="#eee"/>
  <line x1="400" y1="217" x2="670" y2="217" stroke="#eee"/>
  
  <!-- Grade 5 - Claude -->
  <rect x="420" y="88" width="50" height="18" fill="#2166ac" rx="2"/>
  <text x="445" y="101" fill="white" class="value">98.2%</text>
  <rect x="420" y="245" width="16" height="18" fill="#f4a582" rx="2"/>
  <text x="500" y="165" class="label">Claude</text>
  
  <!-- Grade 5 - DeepSeek -->
  <rect x="530" y="84" width="55" height="18" fill="#2166ac" rx="2"/>
  <text x="557" y="97" fill="white" class="value">103.7%</text>
  <rect x="530" y="224" width="38" height="18" fill="#f4a582" rx="2"/>
  <text x="610" y="165" class="label">DeepSeek</text>
  
  <!-- Grade 5 - GPT-4o -->
  <rect x="640" y="88" width="50" height="18" fill="#2166ac" rx="2"/>
  <text x="665" y="101" fill="white" class="value">98.7%</text>
  <rect x="640" y="230" width="35" height="18" fill="#f4a582" rx="2"/>
  
  <!-- X-axis line -->
  <line x1="400" y1="280" x2="670" y2="280" stroke="#333" stroke-width="1"/>
  
  <!-- Legend -->
  <rect x="180" y="330" width="12" height="10" fill="#2166ac"/>
  <text x="198" y="339" class="label">Retained Skills</text>
  <rect x="290" y="330" width="12" height="10" fill="#b2182b"/>
  <text x="308" y="339" class="label">Forgotten Skills</text>
  
  <!-- Reference line at 100 -->
  <line x1="50" y1="82" x2="670" y2="82" stroke="#2166ac" stroke-width="1" stroke-dasharray="4,4"/>
</svg>