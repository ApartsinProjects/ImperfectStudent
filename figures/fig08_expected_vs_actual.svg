<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 16px; font-weight: bold; fill: #1a365d; }
      .subtitle { font-family: 'Arial', sans-serif; font-size: 13px; fill: #718096; }
      .label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #2d3748; }
      .small { font-family: 'Arial', sans-serif; font-size: 12px; }
      .bold { font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="white"/>

  <!-- Chart Area -->
  <g transform="translate(90, 50)">
    <!-- Grid area -->
    <rect x="0" y="0" width="720" height="300" fill="#fafafa" stroke="#e2e8f0" rx="4"/>
    
    <!-- Diagonal reference line (perfect agreement: y = 300 - x) -->
    <line x1="0" y1="300" x2="720" y2="0" stroke="#38a169" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="680" y="30" class="small bold" fill="#276749">Diagonal (perfect)</text>
    
    <!-- Y-axis -->
    <line x1="0" y1="0" x2="0" y2="300" stroke="#2d3748" stroke-width="1"/>
    <text x="-25" y="150" transform="rotate(-90, -25, 150)" text-anchor="middle" class="label">Actual Accuracy</text>
    
    <!-- X-axis -->
    <line x1="0" y1="300" x2="720" y2="300" stroke="#2d3748" stroke-width="1"/>
    <text x="360" y="330" text-anchor="middle" class="label">Expected Accuracy</text>
    
    <!-- Y-axis labels (0 to 1) -->
    <text x="-10" y="4" text-anchor="end" class="small">1.0</text>
    <text x="-10" y="76" text-anchor="end" class="small">0.8</text>
    <text x="-10" y="151" text-anchor="end" class="small">0.6</text>
    <text x="-10" y="226" text-anchor="end" class="small">0.4</text>
    <text x="-10" y="304" text-anchor="end" class="small">0.2</text>
    
    <!-- X-axis labels (0 to 1) -->
    <text x="0" y="318" text-anchor="start" class="small">0.0</text>
    <text x="144" y="318" text-anchor="middle" class="small">0.2</text>
    <text x="288" y="318" text-anchor="middle" class="small">0.4</text>
    <text x="432" y="318" text-anchor="middle" class="small">0.6</text>
    <text x="576" y="318" text-anchor="middle" class="small">0.8</text>
    <text x="720" y="318" text-anchor="end" class="small">1.0</text>
    
    <!-- Zone indicators -->
    <rect x="0" y="0" width="720" height="150" fill="#c6f6d5" opacity="0.1"/>
    <rect x="0" y="150" width="720" height="150" fill="#fed7d7" opacity="0.1"/>
    
    <!-- Data points - Claude (near diagonal, slight positive deviation - better than expected) -->
    <!-- Report: Claude clusters around diagonal with positive prediction scores -->
    <g fill="#dd6b20" opacity="0.8">
      <circle cx="100" cy="290" r="7"/>
      <circle cx="180" cy="265" r="7"/>
      <circle cx="250" cy="240" r="7"/>
      <circle cx="320" cy="220" r="7"/>
      <circle cx="390" cy="195" r="7"/>
      <circle cx="460" cy="170" r="7"/>
      <circle cx="530" cy="145" r="7"/>
      <circle cx="600" cy="120" r="7"/>
    </g>
    
    <!-- Data points - DeepSeek (near diagonal) -->
    <g fill="#38a169" opacity="0.8">
      <circle cx="110" cy="295" r="7"/>
      <circle cx="190" cy="275" r="7"/>
      <circle cx="260" cy="250" r="7"/>
      <circle cx="330" cy="230" r="7"/>
      <circle cx="400" cy="205" r="7"/>
      <circle cx="470" cy="180" r="7"/>
      <circle cx="540" cy="155" r="7"/>
      <circle cx="610" cy="130" r="7"/>
    </g>
    
    <!-- Data points - GPT-4o (BELOW diagonal - under-performance!) -->
    <g fill="#3182ce" opacity="0.8">
      <circle cx="100" cy="295" r="7"/>
      <circle cx="180" cy="285" r="7"/>
      <circle cx="250" cy="270" r="7"/>
      <circle cx="320" cy="255" r="7"/>
      <circle cx="390" cy="240" r="7"/>
      <circle cx="460" cy="220" r="7"/>
      <circle cx="530" cy="200" r="7"/>
      <circle cx="600" cy="180" r="7"/>
    </g>
  </g>

  <!-- Compact Legend -->
  <g transform="translate(90, 370)">
    <circle cx="10" cy="10" r="8" fill="#dd6b20"/>
    <text x="25" y="14" class="small bold">Claude</text>
    
    <circle cx="120" cy="10" r="8" fill="#38a169"/>
    <text x="135" y="14" class="small bold">DeepSeek</text>
    
    <circle cx="230" cy="10" r="8" fill="#3182ce"/>
    <text x="245" y="14" class="small bold">GPT-4o</text>
    
    <text x="350" y="14" class="small" fill="#276749">Near diagonal = accurate</text>
    <text x="560" y="14" class="small" fill="#c53030">Below = under-performance</text>
  </g>
</svg>
