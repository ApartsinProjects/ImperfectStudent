<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 18px; font-weight: bold; fill: #1a365d; }
      .subtitle { font-family: 'Times New Roman', serif; font-size: 14px; fill: #4a5568; }
      .label { font-family: 'Arial', sans-serif; font-size: 12px; fill: #2d3748; }
      .small { font-family: 'Arial', sans-serif; font-size: 10px; fill: #718096; }
      .bold { font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c5282"/>
    </marker>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b6cb0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fc8181;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e53e3e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="white"/>

  <!-- Title -->
  <!-- <text x="500" y="35" text-anchor="middle" class="title">Controllable Generative Student Architecture</text>
  <text x="500" y="58" text-anchor="middle" class="subtitle">Pipeline for Skill-Level Behavioral Control in Language Models</text> -->

  <!-- Step 1: Skill Vector -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="180" height="140" fill="#ebf8ff" stroke="#2c5282" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" class="label bold">Step 1: Input</text>
    <text x="90" y="45" text-anchor="middle" class="small">Binary Skill Vector</text>
    
    <!-- Vector visualization -->
    <rect x="20" y="60" width="30" height="25" fill="#48bb78" rx="3"/>
    <text x="35" y="77" text-anchor="middle" fill="white" font-size="14" font-weight="bold">1</text>
    
    <rect x="55" y="60" width="30" height="25" fill="#fc8181" rx="3"/>
    <text x="70" y="77" text-anchor="middle" fill="white" font-size="14" font-weight="bold">0</text>
    
    <rect x="90" y="60" width="30" height="25" fill="#48bb78" rx="3"/>
    <text x="105" y="77" text-anchor="middle" fill="white" font-size="14" font-weight="bold">1</text>
    
    <rect x="125" y="60" width="30" height="25" fill="#48bb78" rx="3"/>
    <text x="140" y="77" text-anchor="middle" fill="white" font-size="14" font-weight="bold">1</text>
    
    <text x="90" y="110" text-anchor="middle" class="small">k = {1, 0, 1, 1}</text>
    <text x="90" y="125" text-anchor="middle" class="small">Retained &amp; Forgotten</text>
  </g>

  <!-- Arrow -->
  <line x1="240" y1="170" x2="290" y2="170" stroke="#2c5282" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Translation -->
  <g transform="translate(300, 100)">
    <rect x="0" y="0" width="180" height="140" fill="#fefcbf" stroke="#d69e2e" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" class="label bold">Step 2: Translation</text>
    <text x="90" y="45" text-anchor="middle" class="small">Skill Profile Builder</text>
    
    <!-- Text description -->
    <text x="15" y="70" class="small">Mastered Skills:</text>
    <text x="15" y="85" class="small" fill="#38a169">• Skill 1: Addition</text>
    <text x="15" y="98" class="small" fill="#38a169">• Skill 3: Subtraction</text>
    
    <text x="15" y="118" class="small">Missing Skills:</text>
    <text x="15" y="133" class="small" fill="#e53e3e">• Skill 2: Fractions</text>
  </g>

  <!-- Arrow -->
  <line x1="490" y1="170" x2="540" y2="170" stroke="#2c5282" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Prompt -->
  <g transform="translate(550, 100)">
    <rect x="0" y="0" width="180" height="140" fill="#e2e8f0" stroke="#4a5568" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" class="label bold">Step 3: Prompt</text>
    <text x="90" y="45" text-anchor="middle" class="small">Structured Profile Prompt</text>
    
    <rect x="10" y="55" width="160" height="70" fill="white" stroke="#cbd5e0" rx="4"/>
    <text x="90" y="75" text-anchor="middle" class="small">"You are a student who</text>
    <text x="90" y="90" text-anchor="middle" class="small">has mastered addition...</text>
    <text x="90" y="105" text-anchor="middle" class="small">but has forgotten fractions.</text>
    <text x="90" y="120" text-anchor="middle" class="small">Answer this question..."</text>
  </g>

  <!-- Arrow -->
  <line x1="740" y1="170" x2="790" y2="170" stroke="#2c5282" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: LLM -->
  <g transform="translate(800, 100)">
    <rect x="0" y="0" width="150" height="140" fill="#bee3f8" stroke="#2b6cb0" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="75" y="25" text-anchor="middle" class="label bold">Step 4: LLM</text>
    <text x="75" y="45" text-anchor="middle" class="small">Language Model</text>
    
    <!-- Brain icon -->
    <ellipse cx="75" cy="90" rx="40" ry="35" fill="url(#blueGrad)" opacity="0.3"/>
    <ellipse cx="75" cy="90" rx="30" ry="25" fill="url(#blueGrad)" opacity="0.5"/>
    <text x="75" y="95" text-anchor="middle" fill="#1a365d" font-size="11" font-weight="bold">LLM</text>
  </g>

  <!-- Bottom section: Output -->
  <g transform="translate(200, 320)">
    <rect x="0" y="0" width="600" height="180" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2" rx="8"/>
    <text x="300" y="30" text-anchor="middle" class="label bold">Output: Controllable Student Behavior</text>
    
    <!-- Comparison boxes -->
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="160" height="100" fill="#c6f6d5" stroke="#38a169" stroke-width="2" rx="6"/>
      <text x="80" y="25" text-anchor="middle" class="small bold" fill="#276749">Retained Skills</text>
      <text x="80" y="50" text-anchor="middle" fill="#38a169" font-size="28" font-weight="bold">85-92%</text>
      <text x="80" y="70" text-anchor="middle" class="small">High Accuracy</text>
      <text x="80" y="85" text-anchor="middle" class="small" fill="#276749">Correct Answers</text>
    </g>
    
    <g transform="translate(220, 50)">
      <rect x="0" y="0" width="160" height="100" fill="#fed7d7" stroke="#e53e3e" stroke-width="2" rx="6"/>
      <text x="80" y="25" text-anchor="middle" class="small bold" fill="#c53030">Forgotten Skills</text>
      <text x="80" y="50" text-anchor="middle" fill="#e53e3e" font-size="28" font-weight="bold">5-15%</text>
      <text x="80" y="70" text-anchor="middle" class="small">Low Accuracy</text>
      <text x="80" y="85" text-anchor="middle" class="small" fill="#c53030">Consistent Errors</text>
    </g>
    
    <g transform="translate(410, 50)">
      <rect x="0" y="0" width="160" height="100" fill="#ebf8ff" stroke="#2b6cb0" stroke-width="2" rx="6"/>
      <text x="80" y="25" text-anchor="middle" class="small bold" fill="#2b6cb0">Controllability</text>
      <text x="80" y="50" text-anchor="middle" fill="#2b6cb0" font-size="28" font-weight="bold">RMSE</text>
      <text x="80" y="70" text-anchor="middle" class="small">~0.08-0.12</text>
      <text x="80" y="85" text-anchor="middle" class="small" fill="#2b6cb0">Low Deviation</text>
    </g>
  </g>

  <!-- Connecting lines -->
  <line x1="140" y1="250" x2="500" y2="320" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="875" y1="250" x2="500" y2="320" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Legend -->
  <g transform="translate(50, 550)">
    <rect x="0" y="0" width="900" height="120" fill="#fafafa" stroke="#e2e8f0" rx="8"/>
    <text x="450" y="25" text-anchor="middle" class="label bold">Key Components of the Framework</text>
    
    <g transform="translate(50, 45)">
      <circle cx="10" cy="10" r="8" fill="#48bb78"/>
      <text x="30" y="15" class="small">k=1 (Retained): Student knows this skill, expects correct responses</text>
    </g>
    
    <g transform="translate(50, 65)">
      <circle cx="10" cy="10" r="8" fill="#fc8181"/>
      <text x="30" y="15" class="small">k=0 (Forgotten): Student has gap, produces consistent errors</text>
    </g>
    
    <g transform="translate(50, 85)">
      <circle cx="10" cy="10" r="8" fill="#4299e1"/>
      <text x="30" y="15" class="small">Controllability: How well model follows skill vector specifications</text>
    </g>
    
    <g transform="translate(500, 45)">
      <circle cx="10" cy="10" r="8" fill="#d69e2e"/>
      <text x="30" y="15" class="small">Prompt Engineering: Rules + Examples for behavioral control</text>
    </g>
    
    <g transform="translate(500, 65)">
      <circle cx="10" cy="10" r="8" fill="#9f7aea"/>
      <text x="30" y="15" class="small">Skill Independence: Localized control without cross-skill interference</text>
    </g>
    
    <g transform="translate(500, 85)">
      <circle cx="10" cy="10" r="8" fill="#ed64a6"/>
      <text x="30" y="15" class="small">Model-Dependent: Controllability varies by model architecture</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="500" y="690" text-anchor="middle" class="small">Figure 1: Complete pipeline for controllable generative student simulation</text>
</svg>
