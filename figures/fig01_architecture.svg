<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 18px; font-weight: bold; fill: #1a365d; }
      .label { font-family: 'Arial', sans-serif; font-size: 13px; fill: #2d3748; }
      .small { font-family: 'Arial', sans-serif; font-size: 11px; fill: #4a5568; }
      .math { font-family: 'Times New Roman', serif; font-size: 12px; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2c5282"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="white"/>

  <!-- Panel A: Framework -->
  <g transform="translate(30, 30)">
    <text x="200" y="0" text-anchor="middle" class="label bold" font-size="14">(a) Controllable Generative Student Framework</text>
    
    <!-- Skill Vector Input -->
    <rect x="0" y="20" width="120" height="80" fill="#ebf8ff" stroke="#2c5282" stroke-width="2" rx="6"/>
    <text x="60" y="40" text-anchor="middle" class="small bold">Skill Vector</text>
    <text x="60" y="58" text-anchor="middle" class="small">m = {1, 0, 1, 1}</text>
    <text x="60" y="72" text-anchor="middle" class="small" fill="#718096">1=retain, 0=forget</text>
    
    <!-- Arrow -->
    <line x1="125" y1="60" x2="165" y2="60" stroke="#2c5282" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- Prompt Builder -->
    <rect x="170" y="20" width="140" height="80" fill="#fefcbf" stroke="#d69e2e" stroke-width="2" rx="6"/>
    <text x="240" y="40" text-anchor="middle" class="small bold">Profile Prompt</text>
    <text x="240" y="58" text-anchor="middle" class="small">Rules + Examples</text>
    <text x="240" y="72" text-anchor="middle" class="small" fill="#718096">Behavioral Control</text>
    
    <!-- Arrow -->
    <line x1="315" y1="60" x2="355" y2="60" stroke="#2c5282" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- LLM -->
    <rect x="360" y="20" width="100" height="80" fill="#e2e8f0" stroke="#4a5568" stroke-width="2" rx="6"/>
    <text x="410" y="45" text-anchor="middle" class="small bold">LLM</text>
    <text x="410" y="62" text-anchor="middle" class="small">Claude / DeepSeek</text>
    <text x="410" y="76" text-anchor="middle" class="small">/ GPT-4o</text>
    
    <!-- Arrow -->
    <line x1="465" y1="60" x2="505" y2="60" stroke="#2c5282" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- Output -->
    <rect x="510" y="20" width="120" height="80" fill="#c6f6d5" stroke="#38a169" stroke-width="2" rx="6"/>
    <text x="570" y="40" text-anchor="middle" class="small bold">Simulated Student</text>
    <text x="570" y="58" text-anchor="middle" class="small">Retained: 85-92%</text>
    <text x="570" y="74" text-anchor="middle" class="small" fill="#c53030">Forgotten: 5-15%</text>
  </g>

  <!-- Panel B: Metrics -->
  <g transform="translate(30, 160)">
    <text x="300" y="0" text-anchor="middle" class="label bold" font-size="14">(b) Controllability Metrics</text>
    
    <!-- Metric boxes -->
    <g transform="translate(0, 15)">
      <!-- Forgetting Score -->
      <rect x="0" y="0" width="140" height="70" fill="#fed7d7" stroke="#e53e3e" stroke-width="1.5" rx="4"/>
      <text x="70" y="18" text-anchor="middle" class="small bold">Forgetting Score</text>
      <text x="70" y="35" text-anchor="middle" class="math">F(s_i) = (a^0 - a*) / a^0</text>
      <text x="70" y="52" text-anchor="middle" class="small" fill="#718096">0=retained, 1=forgotten</text>
      
      <!-- RMSE -->
      <rect x="160" y="0" width="140" height="70" fill="#bee3f8" stroke="#3182ce" stroke-width="1.5" rx="4"/>
      <text x="230" y="18" text-anchor="middle" class="small bold">RMSE</text>
      <text x="230" y="35" text-anchor="middle" class="math">sqrt(mean(m - a*)²)</text>
      <text x="230" y="52" text-anchor="middle" class="small" fill="#718096">0=perfect control</text>
      
      <!-- Controllability Score -->
      <rect x="320" y="0" width="140" height="70" fill="#c6f6d5" stroke="#38a169" stroke-width="1.5" rx="4"/>
      <text x="390" y="18" text-anchor="middle" class="small bold">Controllability</text>
      <text x="390" y="35" text-anchor="middle" class="math">C = mean(g(m, a*))</text>
      <text x="390" y="52" text-anchor="middle" class="small" fill="#718096">1=perfect alignment</text>
      
      <!-- Deviation -->
      <rect x="480" y="0" width="140" height="70" fill="#fefcbf" stroke="#d69e2e" stroke-width="1.5" rx="4"/>
      <text x="550" y="18" text-anchor="middle" class="small bold">Deviation</text>
      <text x="550" y="35" text-anchor="middle" class="math">D = a* - m</text>
      <text x="550" y="52" text-anchor="middle" class="small" fill="#718096">0=exact match</text>
    </g>
  </g>

  <!-- Panel C: Key Results -->
  <g transform="translate(30, 280)">
    <text x="250" y="0" text-anchor="middle" class="label bold" font-size="14">(c) Experimental Results Summary</text>
    
    <!-- Model comparison -->
    <rect x="0" y="15" width="580" height="100" fill="#f7fafc" stroke="#e2e8f0" rx="4"/>
    
    <text x="30" y="35" class="small bold">Model</text>
    <text x="120" y="35" class="small bold">Forgotten Acc</text>
    <text x="230" y="35" class="small bold">RMSE</text>
    <text x="340" y="35" class="small bold">Controllability</text>
    <text x="480" y="35" class="small bold">Finding</text>
    
    <!-- Claude -->
    <text x="30" y="60" class="small">Claude 3.5</text>
    <text x="120" y="60" class="small" fill="#38a169">5-15%</text>
    <text x="230" y="60" class="small" fill="#38a169">0.08-0.12</text>
    <text x="340" y="60" class="small" fill="#38a169">Highest</text>
    <text x="480" y="60" class="small">Best control</text>
    
    <!-- GPT-4o -->
    <text x="30" y="85" class="small">GPT-4o</text>
    <text x="120" y="85" class="small" fill="#d69e2e">20-35%</text>
    <text x="230" y="85" class="small" fill="#d69e2e">0.20-0.35</text>
    <text x="340" y="85" class="small" fill="#d69e2e">Moderate</text>
    <text x="480" y="85" class="small">Under-performs</text>
    
    <!-- DeepSeek -->
    <text x="30" y="110" class="small">DeepSeek</text>
    <text x="120" y="110" class="small" fill="#e53e3e">30-40%</text>
    <text x="230" y="110" class="small" fill="#e53e3e">0.30-0.40</text>
    <text x="340" y="110" class="small" fill="#e53e3e">Low</text>
    <text x="480" y="110" class="small">Resists control</text>
  </g>

  <!-- Key Insights Box -->
  <g transform="translate(630, 160)">
    <rect x="0" y="0" width="250" height="180" fill="#ebf8ff" stroke="#2c5282" rx="6"/>
    <text x="125" y="20" text-anchor="middle" class="label bold">Key Insights</text>
    
    <text x="10" y="45" class="small" fill="#276749">1. Combined prompting</text>
    <text x="10" y="58" class="small">   (rules + examples)</text>
    <text x="10" y="71" class="small" fill="#276749">   achieves 4-7x better</text>
    <text x="10" y="84" class="small">   RMSE than alone</text>
    
    <text x="10" y="110" class="small" fill="#276749">2. Skills independent</text>
    <text x="10" y="123" class="small">   (|ρ| &lt; 0.15)</text>
    <text x="10" y="136" class="small">   Localized forgetting</text>
    <text x="10" y="149" class="small">   without interference</text>
    
    <text x="10" y="170" class="small" fill="#276749">3. Architecture matters</text>
    <text x="10" y="183" class="small">   Controllability varies</text>
    <text x="10" y="196" class="small">   by model selection</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 410)">
    <text x="0" y="0" class="small"><tspan font-weight="bold">Notation:</tspan> m = mastery vector | a* = controlled accuracy | a^0 = baseline accuracy</text>
    <text x="0" y="14" class="small"><tspan font-weight="bold">Key:</tspan> Green = best performance | Red = worst | Combined prompting: rules + few-shot examples</text>
  </g>
</svg>