<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 20px; font-weight: bold; fill: #1a365d; }
      .subtitle { font-family: 'Arial', sans-serif; font-size: 12px; fill: #718096; }
      .label { font-family: 'Arial', sans-serif; font-size: 11px; fill: #2d3748; }
      .small { font-family: 'Arial', sans-serif; font-size: 9px; }
      .tick { font-family: 'Arial', sans-serif; font-size: 8px; }
      .bold { font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="white"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" class="title">Key Results Summary: Controllability Benchmark</text>
  <text x="600" y="55" text-anchor="middle" class="subtitle">Comprehensive comparison of controllable skill forgetting across models, strategies, and metrics</text>

  <!-- Panel 1: Prompt Strategy Comparison (RMSE) -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="350" height="300" fill="#f7fafc" stroke="#e2e8f0" rx="8"/>
    <text x="175" y="25" text-anchor="middle" class="label bold">A. Prompt Strategy Effectiveness (RMSE)</text>
    
    <!-- Y-axis -->
    <line x1="50" y1="50" x2="50" y2="240" stroke="#2d3748" stroke-width="1"/>
    <text x="25" y="145" transform="rotate(-90, 25, 145)" text-anchor="middle" class="small">RMSE (lower is better)</text>
    
    <!-- Bars -->
    <g transform="translate(70, 50)">
      <!-- Y-axis ticks -->
      <line x1="-5" y1="0" x2="0" y2="0" stroke="#2d3748"/>
      <text x="-8" y="3" text-anchor="end" class="tick">0.7</text>
      <line x1="-5" y1="50" x2="0" y2="50" stroke="#2d3748"/>
      <text x="-8" y="53" text-anchor="end" class="tick">0.5</text>
      <line x1="-5" y1="100" x2="0" y2="100" stroke="#2d3748"/>
      <text x="-8" y="103" text-anchor="end" class="tick">0.3</text>
      <line x1="-5" y1="150" x2="0" y2="150" stroke="#2d3748"/>
      <text x="-8" y="153" text-anchor="end" class="tick">0.2</text>
      <line x1="-5" y1="190" x2="0" y2="190" stroke="#2d3748"/>
      <text x="-8" y="193" text-anchor="end" class="tick">0.0</text>
      
      <!-- Grid -->
      <g stroke="#e2e8f0" stroke-dasharray="2,2">
        <line x1="0" y1="50" x2="260" y2="50"/>
        <line x1="0" y1="100" x2="260" y2="100"/>
        <line x1="0" y1="150" x2="260" y2="150"/>
      </g>
      
      <!-- Grade 4 bars -->
      <rect x="20" y="20" width="35" height="170" fill="#48bb78" rx="2"/>
      <text x="37" y="15" text-anchor="middle" class="tick" fill="#38a169">0.09</text>
      
      <rect x="65" y="128" width="35" height="62" fill="#4299e1" rx="2"/>
      <text x="82" y="123" text-anchor="middle" class="tick" fill="#3182ce">0.50</text>
      
      <rect x="110" y="120" width="35" height="70" fill="#ed8936" rx="2"/>
      <text x="127" y="115" text-anchor="middle" class="tick" fill="#dd6b20">0.53</text>
      
      <!-- Grade 5 bars -->
      <rect x="160" y="10" width="35" height="180" fill="#48bb78" rx="2"/>
      <text x="177" y="5" text-anchor="middle" class="tick" fill="#38a169">0.11</text>
      
      <rect x="205" y="118" width="35" height="72" fill="#4299e1" rx="2"/>
      <text x="222" y="113" text-anchor="middle" class="tick" fill="#3182ce">0.55</text>
      
      <rect x="250" y="110" width="35" height="80" fill="#ed8936" rx="2"/>
      <text x="267" y="105" text-anchor="middle" class="tick" fill="#dd6b20">0.58</text>
      
      <!-- X-axis -->
      <line x1="0" y1="190" x2="300" y2="190" stroke="#2d3748"/>
      
      <!-- Labels -->
      <text x="57" y="205" text-anchor="middle" class="small">Comb.</text>
      <text x="57" y="215" text-anchor="middle" class="small">G4</text>
      <text x="102" y="205" text-anchor="middle" class="small">FS</text>
      <text x="102" y="215" text-anchor="middle" class="small">G4</text>
      <text x="147" y="205" text-anchor="middle" class="small">RB</text>
      <text x="147" y="215" text-anchor="middle" class="small">G4</text>
      
      <text x="197" y="205" text-anchor="middle" class="small">Comb.</text>
      <text x="197" y="215" text-anchor="middle" class="small">G5</text>
      <text x="242" y="205" text-anchor="middle" class="small">FS</text>
      <text x="242" y="215" text-anchor="middle" class="small">G5</text>
      <text x="287" y="205" text-anchor="middle" class="small">RB</text>
      <text x="287" y="215" text-anchor="middle" class="small">G5</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(60, 255)">
      <rect x="0" y="0" width="12" height="12" fill="#48bb78" rx="2"/>
      <text x="18" y="10" class="small">Combined (Best)</text>
      <rect x="100" y="0" width="12" height="12" fill="#4299e1" rx="2"/>
      <text x="118" y="10" class="small">Few-Shot</text>
      <rect x="180" y="0" width="12" height="12" fill="#ed8936" rx="2"/>
      <text x="198" y="10" class="small">Rule-Based</text>
    </g>
  </g>

  <!-- Panel 2: Model Comparison -->
  <g transform="translate(420, 80)">
    <rect x="0" y="0" width="350" height="300" fill="#f7fafc" stroke="#e2e8f0" rx="8"/>
    <text x="175" y="25" text-anchor="middle" class="label bold">B. Model Controllability Comparison</text>
    
    <!-- Table-like comparison -->
    <g transform="translate(20, 50)">
      <!-- Header -->
      <rect x="0" y="0" width="310" height="30" fill="#2c5282" rx="4"/>
      <text x="50" y="20" text-anchor="middle" fill="white" class="small bold">Model</text>
      <text x="130" y="20" text-anchor="middle" fill="white" class="small bold">Forgotten Acc.</text>
      <text x="220" y="20" text-anchor="middle" fill="white" class="small bold">RMSE</text>
      
      <!-- Claude row -->
      <rect x="0" y="38" width="310" height="35" fill="#c6f6d5" stroke="#9ae6b4" rx="2"/>
      <text x="50" y="60" text-anchor="middle" class="small bold" fill="#276749">Claude</text>
      <text x="130" y="60" text-anchor="middle" class="small" fill="#276749">5-15%</text>
      <text x="220" y="60" text-anchor="middle" class="small bold" fill="#276749">0.08-0.12</text>
      
      <!-- DeepSeek row -->
      <rect x="0" y="78" width="310" height="35" fill="#fef3c7" stroke="#f6e05e" rx="2"/>
      <text x="50" y="100" text-anchor="middle" class="small bold" fill="#975a16">DeepSeek</text>
      <text x="130" y="100" text-anchor="middle" class="small" fill="#975a16">30-40%</text>
      <text x="220" y="100" text-anchor="middle" class="small" fill="#975a16">0.30-0.40</text>
      
      <!-- GPT-4o row -->
      <rect x="0" y="118" width="310" height="35" fill="#bee3f8" stroke="#90cdf4" rx="2"/>
      <text x="50" y="140" text-anchor="middle" class="small bold" fill="#2b6cb0">GPT-4o</text>
      <text x="130" y="140" text-anchor="middle" class="small" fill="#2b6cb0">20-35%</text>
      <text x="220" y="140" text-anchor="middle" class="small" fill="#2b6cb0">0.20-0.35</text>
      
      <!-- Perfect baseline -->
      <rect x="0" y="158" width="310" height="35" fill="#e2e8f0" stroke="#cbd5e0" rx="2"/>
      <text x="50" y="180" text-anchor="middle" class="small bold" fill="#4a5568">Perfect</text>
      <text x="130" y="180" text-anchor="middle" class="small" fill="#4a5568">Baseline</text>
      <text x="220" y="180" text-anchor="middle" class="small" fill="#4a5568">85-92%</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(20, 230)">
      <text x="0" y="0" class="small" fill="#38a169">✓ Best controllability</text>
      <text x="0" y="15" class="small" fill="#d69e2e">⚠ Partial resistance</text>
      <text x="120" y="0" class="small" fill="#3182ce">≈ Variable behavior</text>
    </g>
  </g>

  <!-- Panel 3: Key Metrics -->
  <g transform="translate(800, 80)">
    <rect x="0" y="0" width="360" height="300" fill="#f7fafc" stroke="#e2e8f0" rx="8"/>
    <text x="180" y="25" text-anchor="middle" class="label bold">C. Key Evaluation Metrics</text>
    
    <g transform="translate(20, 50)">
      <!-- Metric 1: Relative Loss -->
      <rect x="0" y="0" width="320" height="55" fill="white" stroke="#e2e8f0" rx="4"/>
      <text x="15" y="20" class="small bold">Relative Loss (RL)</text>
      <text x="15" y="38" class="small">For forgotten: RL = (A_base - A_ctrl) / A_base</text>
      <text x="15" y="50" class="small">Desirable: RL → 1 (complete forgetting)</text>
      
      <!-- Metric 2: RMSE -->
      <rect x="0" y="65" width="320" height="55" fill="white" stroke="#e2e8f0" rx="4"/>
      <text x="15" y="85" class="small bold">Root Mean Squared Error (RMSE)</text>
      <text x="15" y="103" class="small">RMSE = √(1/K Σ(k_i - A_ctrl)²)</text>
      <text x="15" y="115" class="small">Desirable: Low values (~0.1) indicate alignment</text>
      
      <!-- Metric 3: Controllability Score -->
      <rect x="0" y="130" width="320" height="55" fill="white" stroke="#e2e8f0" rx="4"/>
      <text x="15" y="150" class="small bold">Controllability Score (CS)</text>
      <text x="15" y="168" class="small">CS = (1/K) Σ f(k_i, A_ctrl)</text>
      <text x="15" y="180" class="small">Desirable: CS → 1 (perfect profile match)</text>
      
      <!-- Metric 4: Prediction Score -->
      <rect x="0" y="195" width="320" height="55" fill="white" stroke="#e2e8f0" rx="4"/>
      <text x="15" y="215" class="small bold">Prediction Score (PS)</text>
      <text x="15" y="233" class="small">PS = A_actual - A_expected</text>
      <text x="15" y="245" class="small">PS ≈ 0: Good | PS &lt; 0: Degradation</text>
    </g>
  </g>

  <!-- Bottom Section: Key Findings -->
  <g transform="translate(40, 410)">
    <rect x="0" y="0" width="1120" height="180" fill="#ebf8ff" stroke="#2c5282" rx="8"/>
    <text x="560" y="30" text-anchor="middle" class="label bold" font-size="14">Key Empirical Findings</text>
    
    <g transform="translate(30, 50)">
      <!-- Finding 1 -->
      <g transform="translate(0, 0)">
        <circle cx="12" cy="12" r="12" fill="#2c5282"/>
        <text x="12" y="16" text-anchor="middle" fill="white" class="small bold">1</text>
        <text x="35" y="10" class="small bold">Selective Forgetting Achievable</text>
        <text x="35" y="25" class="small">All models demonstrated controllable skill suppression</text>
      </g>
      
      <!-- Finding 2 -->
      <g transform="translate(280, 0)">
        <circle cx="12" cy="12" r="12" fill="#2c5282"/>
        <text x="12" y="16" text-anchor="middle" fill="white" class="small bold">2</text>
        <text x="35" y="10" class="small bold">Retention Remains Stable</text>
        <text x="35" y="25" class="small">Retained skills maintained 85-92% accuracy</text>
      </g>
      
      <!-- Finding 3 -->
      <g transform="translate(560, 0)">
        <circle cx="12" cy="12" r="12" fill="#2c5282"/>
        <text x="12" y="16" text-anchor="middle" fill="white" class="small bold">3</text>
        <text x="35" y="10" class="small bold">Skills Are Independent</text>
        <text x="35" y="25" class="small">Weak correlations (ρ ≈ -0.1) enable localized control</text>
      </g>
      
      <!-- Finding 4 -->
      <g transform="translate(830, 0)">
        <circle cx="12" cy="12" r="12" fill="#2c5282"/>
        <text x="12" y="16" text-anchor="middle" fill="white" class="small bold">4</text>
        <text x="35" y="10" class="small bold">Model Architecture Matters</text>
        <text x="35" y="25" class="small">Claude &gt; GPT-4o &gt; DeepSeek for controllability</text>
      </g>
      
      <!-- Finding 5 -->
      <g transform="translate(0, 55)">
        <circle cx="12" cy="12" r="12" fill="#2c5282"/>
        <text x="12" y="16" text-anchor="middle" fill="white" class="small bold">5</text>
        <text x="35" y="10" class="small bold">Combined Prompting Best</text>
        <text x="35" y="25" class="small">Rules + Examples &gt; Either alone</text>
      </g>
      
      <!-- Finding 6 -->
      <g transform="translate(280, 55)">
        <circle cx="12" cy="12" r="12" fill="#2c5282"/>
        <text x="12" y="16" text-anchor="middle" fill="white" class="small bold">6</text>
        <text x="35" y="10" class="small bold">Forgetting Is Localized</text>
        <text x="35" y="25" class="small">Degradation limited to specified skills</text>
      </g>
      
      <!-- Finding 7 -->
      <g transform="translate(560, 55)">
        <circle cx="12" cy="12" r="12" fill="#2c5282"/>
        <text x="12" y="16" text-anchor="middle" fill="white" class="small bold">7</text>
        <text x="35" y="10" class="small bold">Claude Most Reliable</text>
        <text x="35" y="25" class="small">Best forgetting + minimal interference</text>
      </g>
    </g>
  </g>

  <!-- Dataset Info -->
  <g transform="translate(40, 620)">
    <rect x="0" y="0" width="1120" height="100" fill="#f7fafc" stroke="#e2e8f0" rx="8"/>
    <text x="560" y="25" text-anchor="middle" class="label bold">Experimental Setup</text>
    
    <g transform="translate(30, 40)">
      <text x="0" y="0" class="small"><tspan font-weight="bold">Dataset:</tspan> MathCAMPS (Grades 4-5, 100 questions each)</text>
      <text x="0" y="15" class="small"><tspan font-weight="bold">Models:</tspan> Claude (Anthropic), DeepSeek, GPT-4o (OpenAI)</text>
      <text x="0" y="30" class="small"><tspan font-weight="bold">Strategies:</tspan> Rule-Based, Few-Shot, Combined (Rules + Examples)</text>
      
      <text x="400" y="0" class="small"><tspan font-weight="bold">Configurations:</tspan> 2^K exhaustive skill vector enumeration</text>
      <text x="400" y="15" class="small"><tspan font-weight="bold">Temperature:</tspan> 0 (deterministic)</text>
      <text x="400" y="30" class="small"><tspan font-weight="bold">Quality Control:</tspan> Ambiguous items replaced while preserving balance</text>
    </g>
  </g>

  <!-- Comparison with Prior Work -->
  <g transform="translate(40, 740)">
    <rect x="0" y="0" width="1120" height="50" fill="#fef3c7" stroke="#d69e2e" rx="4"/>
    <text x="30" y="25" class="small bold" fill="#975a16">Novelty:</text>
    <text x="120" y="25" class="small" fill="#975a16">First systematic benchmark for skill-level controllability | Distinguishes from fact forgetting | Novel metrics beyond accuracy</text>
  </g>

  <!-- Footer -->
  <text x="600" y="795" text-anchor="middle" class="small" fill="#718096">Figure: Comprehensive Results Summary - Controllable Skill Forgetting Benchmark</text>
</svg>
