<svg xmlns="http://www.w3.org/2000/svg" viewBox="24 16 470 226">
  <defs>
    <style>
      .label { font-family: 'Arial', sans-serif; font-size: 12px; fill: #2d3748; font-weight: bold; }
      .small { font-family: 'Arial', sans-serif; font-size: 11px; fill: #2d3748; }
      .tick { font-family: 'Arial', sans-serif; font-size: 10px; fill: #718096; }
    </style>
  </defs>

  <rect width="520" height="300" fill="white"/>

  <g transform="translate(74, 32)">
    <line x1="0" y1="0" x2="0" y2="170" stroke="#2d3748" stroke-width="1"/>
    <line x1="0" y1="170" x2="390" y2="170" stroke="#2d3748" stroke-width="1"/>
    <text x="-34" y="85" transform="rotate(-90, -34, 85)" text-anchor="middle" class="label">Prediction score</text>

    <g class="tick">
      <text x="-8" y="4" text-anchor="end">+0.15</text>
      <text x="-8" y="42" text-anchor="end">+0.10</text>
      <text x="-8" y="80" text-anchor="end">0.00</text>
      <text x="-8" y="120" text-anchor="end">-0.10</text>
      <text x="-8" y="170" text-anchor="end">-0.20</text>
    </g>

    <g stroke="#e2e8f0" stroke-dasharray="3,3">
      <line x1="0" y1="38" x2="390" y2="38"/>
      <line x1="0" y1="118" x2="390" y2="118"/>
    </g>

    <line x1="0" y1="78" x2="390" y2="78" stroke="#38a169" stroke-width="1.5" stroke-dasharray="4,2"/>

    <!-- Claude -->
    <g>
      <line x1="70" y1="0" x2="70" y2="56" stroke="#2b6cb0" stroke-width="1.6"/>
      <line x1="56" y1="0" x2="84" y2="0" stroke="#2b6cb0" stroke-width="2"/>
      <line x1="56" y1="56" x2="84" y2="56" stroke="#2b6cb0" stroke-width="2"/>
      <rect x="50" y="24" width="40" height="24" fill="#2b6cb0" rx="3"/>
      <line x1="50" y1="36" x2="90" y2="36" stroke="white" stroke-width="2"/>
      <text x="70" y="98" text-anchor="middle" class="tick">+0.08 to +0.15</text>
      <text x="70" y="196" text-anchor="middle" class="small">Claude</text>
    </g>

    <!-- DeepSeek -->
    <g>
      <line x1="190" y1="34" x2="190" y2="62" stroke="#38a169" stroke-width="1.6"/>
      <line x1="176" y1="34" x2="204" y2="34" stroke="#38a169" stroke-width="2"/>
      <line x1="176" y1="62" x2="204" y2="62" stroke="#38a169" stroke-width="2"/>
      <rect x="170" y="46" width="40" height="12" fill="#38a169" rx="3"/>
      <line x1="170" y1="52" x2="210" y2="52" stroke="white" stroke-width="2"/>
      <text x="190" y="98" text-anchor="middle" class="tick">+0.02 to +0.08</text>
      <text x="190" y="196" text-anchor="middle" class="small">DeepSeek</text>
    </g>

    <!-- GPT-4o -->
    <g>
      <line x1="310" y1="90" x2="310" y2="138" stroke="#dd6b20" stroke-width="1.6"/>
      <line x1="296" y1="90" x2="324" y2="90" stroke="#dd6b20" stroke-width="2"/>
      <line x1="296" y1="138" x2="324" y2="138" stroke="#dd6b20" stroke-width="2"/>
      <rect x="290" y="106" width="40" height="16" fill="#dd6b20" rx="3"/>
      <line x1="290" y1="114" x2="330" y2="114" stroke="white" stroke-width="2"/>
      <text x="310" y="150" text-anchor="middle" class="tick">-0.12 to -0.03</text>
      <text x="310" y="196" text-anchor="middle" class="small">GPT-4o</text>
    </g>

    <g transform="translate(286, 4)">
      <rect x="0" y="0" width="120" height="64" fill="white" stroke="#e2e8f0" rx="4" opacity="0.96"/>
      <text x="60" y="14" text-anchor="middle" class="tick">Model</text>
      <rect x="10" y="22" width="10" height="10" fill="#2b6cb0" rx="2"/>
      <text x="26" y="31" class="tick">Claude</text>
      <rect x="10" y="38" width="10" height="10" fill="#38a169" rx="2"/>
      <text x="26" y="47" class="tick">DeepSeek</text>
      <rect x="10" y="54" width="10" height="10" fill="#dd6b20" rx="2"/>
      <text x="26" y="63" class="tick">GPT-4o</text>
    </g>
  </g>
</svg>
