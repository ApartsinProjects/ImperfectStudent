<svg xmlns="http://www.w3.org/2000/svg" viewBox="28 20 562 282">
  <defs>
    <style>
      .label { font-family: 'Arial', sans-serif; font-size: 12px; fill: #2d3748; font-weight: bold; }
      .small { font-family: 'Arial', sans-serif; font-size: 11px; fill: #2d3748; }
      .tick { font-family: 'Arial', sans-serif; font-size: 10px; fill: #718096; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="620" height="315" fill="white"/>

  <!-- Chart Area -->
  <g transform="translate(86, 38)">
    <!-- Y-axis -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#2d3748" stroke-width="1"/>
    <text x="-42" y="100" transform="rotate(-90, -42, 100)" text-anchor="middle" class="label">Accuracy (%)</text>
    
    <!-- Y-axis ticks: 100%=0, 50%=200 -->
    <g class="tick">
      <text x="-10" y="4" text-anchor="end">100%</text>
      <text x="-10" y="40" text-anchor="end">90%</text>
      <text x="-10" y="80" text-anchor="end">80%</text>
      <text x="-10" y="120" text-anchor="end">70%</text>
      <text x="-10" y="160" text-anchor="end">60%</text>
      <text x="-10" y="204" text-anchor="end">50%</text>
    </g>
    
    <!-- Grid -->
    <g stroke="#e2e8f0" stroke-dasharray="2,2">
      <line x1="0" y1="40" x2="470" y2="40"/>
      <line x1="0" y1="80" x2="470" y2="80"/>
      <line x1="0" y1="120" x2="470" y2="120"/>
      <line x1="0" y1="160" x2="470" y2="160"/>
    </g>
    
    <!-- X-axis -->
    <line x1="0" y1="200" x2="470" y2="200" stroke="#2d3748"/>

    <!-- Simple grouped bars - no whiskers, just clear bars showing ranges -->
    
    <!-- Claude -->
    <g transform="translate(15, 0)">
      <!-- Perfect: 96% -->
      <rect x="0" y="2" width="40" height="10" fill="#805ad5" rx="3"/>
      <line x1="0" y1="7" x2="40" y2="7" stroke="white" stroke-width="2"/>
      
      <!-- Retained: 88%, range 85-92 -->
      <line x1="60" y1="8" x2="60" y2="24" stroke="#ed8936" stroke-width="1.5"/>
      <line x1="48" y1="8" x2="72" y2="8" stroke="#ed8936" stroke-width="2"/>
      <line x1="48" y1="24" x2="72" y2="24" stroke="#ed8936" stroke-width="2"/>
      <rect x="40" y="12" width="40" height="8" fill="#ed8936" rx="3"/>
      <line x1="40" y1="16" x2="80" y2="16" stroke="white" stroke-width="2"/>
      
      <!-- Forgotten: 10%, range 5-15 -->
      <line x1="100" y1="160" x2="100" y2="192" stroke="#ed8936" stroke-width="1.5" opacity="0.5"/>
      <line x1="88" y1="160" x2="112" y2="160" stroke="#ed8936" stroke-width="2" opacity="0.5"/>
      <line x1="88" y1="192" x2="112" y2="192" stroke="#ed8936" stroke-width="2" opacity="0.5"/>
      <rect x="80" y="168" width="40" height="16" fill="#ed8936" rx="3" opacity="0.5"/>
      <line x1="80" y1="176" x2="120" y2="176" stroke="white" stroke-width="2" opacity="0.8"/>
      
      <!-- Model label -->
      <text x="60" y="222" text-anchor="middle" class="small">Claude</text>
    </g>

    <!-- DeepSeek -->
    <g transform="translate(170, 0)">
      <!-- Perfect: 97% -->
      <rect x="0" y="0" width="40" height="12" fill="#805ad5" rx="3"/>
      <line x1="0" y1="6" x2="40" y2="6" stroke="white" stroke-width="2"/>
      
      <!-- Retained: 88%, range 85-92 -->
      <line x1="60" y1="8" x2="60" y2="24" stroke="#38a169" stroke-width="1.5"/>
      <line x1="48" y1="8" x2="72" y2="8" stroke="#38a169" stroke-width="2"/>
      <line x1="48" y1="24" x2="72" y2="24" stroke="#38a169" stroke-width="2"/>
      <rect x="40" y="12" width="40" height="8" fill="#38a169" rx="3"/>
      <line x1="40" y1="16" x2="80" y2="16" stroke="white" stroke-width="2"/>
      
      <!-- Forgotten: 35%, range 30-40 -->
      <line x1="100" y1="112" x2="100" y2="144" stroke="#38a169" stroke-width="1.5" opacity="0.5"/>
      <line x1="88" y1="112" x2="112" y2="112" stroke="#38a169" stroke-width="2" opacity="0.5"/>
      <line x1="88" y1="144" x2="112" y2="144" stroke="#38a169" stroke-width="2" opacity="0.5"/>
      <rect x="80" y="120" width="40" height="16" fill="#38a169" rx="3" opacity="0.5"/>
      <line x1="80" y1="128" x2="120" y2="128" stroke="white" stroke-width="2" opacity="0.8"/>
      
      <text x="60" y="222" text-anchor="middle" class="small">DeepSeek</text>
    </g>

    <!-- GPT-4o -->
    <g transform="translate(325, 0)">
      <!-- Perfect: 95% -->
      <rect x="0" y="2" width="40" height="12" fill="#805ad5" rx="3"/>
      <line x1="0" y1="8" x2="40" y2="8" stroke="white" stroke-width="2"/>
      
      <!-- Retained: 86%, range 84-90 -->
      <line x1="60" y1="10" x2="60" y2="26" stroke="#3182ce" stroke-width="1.5"/>
      <line x1="48" y1="10" x2="72" y2="10" stroke="#3182ce" stroke-width="2"/>
      <line x1="48" y1="26" x2="72" y2="26" stroke="#3182ce" stroke-width="2"/>
      <rect x="40" y="14" width="40" height="8" fill="#3182ce" rx="3"/>
      <line x1="40" y1="18" x2="80" y2="18" stroke="white" stroke-width="2"/>
      
      <!-- Forgotten: 28%, range 20-35 -->
      <line x1="100" y1="120" x2="100" y2="160" stroke="#3182ce" stroke-width="1.5" opacity="0.5"/>
      <line x1="88" y1="120" x2="112" y2="120" stroke="#3182ce" stroke-width="2" opacity="0.5"/>
      <line x1="88" y1="160" x2="112" y2="160" stroke="#3182ce" stroke-width="2" opacity="0.5"/>
      <rect x="80" y="132" width="40" height="20" fill="#3182ce" rx="3" opacity="0.5"/>
      <line x1="80" y1="142" x2="120" y2="142" stroke="white" stroke-width="2" opacity="0.8"/>
      
      <text x="60" y="222" text-anchor="middle" class="small">GPT-4o</text>
    </g>
  </g>

  <!-- Legend - bottom, centered -->
  <g transform="translate(92, 284)">
    <rect x="0" y="0" width="10" height="10" fill="#805ad5" rx="2"/>
    <text x="15" y="9" class="tick">Perfect student baseline</text>
    
    <rect x="155" y="0" width="10" height="10" fill="#ed8936" rx="2"/>
    <rect x="170" y="0" width="10" height="10" fill="#38a169" rx="2"/>
    <rect x="185" y="0" width="10" height="10" fill="#3182ce" rx="2"/>
    <text x="202" y="9" class="tick">Retained skill range (model color)</text>
    
    <rect x="385" y="0" width="10" height="10" fill="#ed8936" rx="2" opacity="0.45"/>
    <rect x="400" y="0" width="10" height="10" fill="#38a169" rx="2" opacity="0.45"/>
    <rect x="415" y="0" width="10" height="10" fill="#3182ce" rx="2" opacity="0.45"/>
    <text x="432" y="9" class="tick">Forgotten skill range</text>
  </g>
</svg>
