<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 16px; font-weight: bold; fill: #1a365d; }
      .label { font-family: 'Arial', sans-serif; font-size: 12px; fill: #2d3748; }
      .small { font-family: 'Arial', sans-serif; font-size: 10px; fill: #4a5568; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="white"/>

  <text x="450" y="25" text-anchor="middle" class="title">MathCAMPS Dataset: Structure and Skill Taxonomy</text>

  <!-- Grade Levels -->
  <g transform="translate(30, 50)">
    <text x="150" y="0" text-anchor="middle" class="label bold">Grade Coverage (1-8)</text>
    <rect x="0" y="10" width="300" height="120" fill="#f7fafc" stroke="#e2e8f0" rx="4"/>
    
    <g transform="translate(20, 25)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="35" height="22" fill="#4299e1" rx="3"/>
      <text x="17" y="15" text-anchor="middle" fill="white" font-size="10">G1</text>
      <rect x="45" y="0" width="35" height="22" fill="#4299e1" rx="3"/>
      <text x="62" y="15" text-anchor="middle" fill="white" font-size="10">G2</text>
      <rect x="90" y="0" width="35" height="22" fill="#4299e1" rx="3"/>
      <text x="107" y="15" text-anchor="middle" fill="white" font-size="10">G3</text>
      <rect x="135" y="0" width="35" height="22" fill="#4299e1" rx="3"/>
      <text x="152" y="15" text-anchor="middle" fill="white" font-size="10">G4</text>
      
      <!-- Row 2 -->
      <rect x="180" y="0" width="35" height="22" fill="#4299e1" rx="3"/>
      <text x="197" y="15" text-anchor="middle" fill="white" font-size="10">G5</text>
      <rect x="225" y="0" width="35" height="22" fill="#4299e1" rx="3"/>
      <text x="242" y="15" text-anchor="middle" fill="white" font-size="10">G6</text>
      
      <!-- Statistics -->
      <text x="0" y="50" class="small"><tspan font-weight="bold">100 questions</tspan> per grade</text>
      <text x="0" y="65" class="small"><tspan font-weight="bold">8-12 skills</tspan> per grade</text>
      <text x="0" y="80" class="small"><tspan font-weight="bold">8-15 questions</tspan> per skill</text>
      <text x="0" y="95" class="small"><tspan font-weight="bold">~800 total</tspan> questions</text>
    </g>
  </g>

  <!-- Skill Taxonomy Example -->
  <g transform="translate(350, 50)">
    <text x="180" y="0" text-anchor="middle" class="label bold">Example: Grade 4 Skill Taxonomy</text>
    <rect x="0" y="10" width="360" height="120" fill="#f7fafc" stroke="#e2e8f0" rx="4"/>
    
    <!-- Skill hierarchy -->
    <g transform="translate(20, 30)">
      <!-- Level 1 -->
      <rect x="0" y="0" width="100" height="25" fill="#38a169" rx="3"/>
      <text x="50" y="17" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Operations</text>
      
      <rect x="130" y="0" width="100" height="25" fill="#4299e1" rx="3"/>
      <text x="180" y="17" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Numbers</text>
      
      <rect x="260" y="0" width="80" height="25" fill="#d69e2e" rx="3"/>
      <text x="300" y="17" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Fractions</text>
      
      <!-- Level 2 -->
      <rect x="10" y="40" width="80" height="20" fill="#9ae6b4" rx="2"/>
      <text x="50" y="54" text-anchor="middle" font-size="9">Addition</text>
      
      <rect x="100" y="40" width="80" height="20" fill="#9ae6b4" rx="2"/>
      <text x="140" y="54" text-anchor="middle" font-size="9">Subtraction</text>
      
      <rect x="140" y="40" width="80" height="20" fill="#9ae6b4" rx="2"/>
      <text x="180" y="54" text-anchor="middle" font-size="9">Multiplication</text>
      
      <rect x="140" y="70" width="80" height="20" fill="#9ae6b4" rx="2"/>
      <text x="180" y="84" text-anchor="middle" font-size="9">Division</text>
      
      <!-- Numbers subtree -->
      <rect x="140" y="70" width="80" height="20" fill="#90cdf4" rx="2"/>
      <text x="180" y="84" text-anchor="middle" font-size="9">Place Value</text>
      
      <!-- Fractions subtree -->
      <rect x="270" y="40" width="70" height="20" fill="#faf089" rx="2"/>
      <text x="305" y="54" text-anchor="middle" font-size="9">Compare</text>
      
      <rect x="270" y="70" width="70" height="20" fill="#faf089" rx="2"/>
      <text x="305" y="84" text-anchor="middle" font-size="9">Add/Sub</text>
    </g>
  </g>

  <!-- Question Format -->
  <g transform="translate(730, 50)">
    <text x="130" y="0" text-anchor="middle" class="label bold">Question Format</text>
    <rect x="0" y="10" width="160" height="120" fill="#f7fafc" stroke="#e2e8f0" rx="4"/>
    
    <text x="80" y="30" text-anchor="middle" class="small bold">Multiple Choice</text>
    <text x="80" y="48" text-anchor="middle" class="small">4 options (A-D)</text>
    
    <rect x="30" y="60" width="100" height="60" fill="white" stroke="#cbd5e0" rx="4"/>
    <text x="80" y="80" text-anchor="middle" class="small">What is 3/4 + 1/8?</text>
    <text x="40" y="98" class="small">A) 7/8</text>
    <text x="80" y="98" class="small">B) 5/8</text>
    <text x="120" y="98" class="small">C) 1/2</text>
    <text x="80" y="115" class="small" fill="#e53e3e">D) 3/8 ← Correct</text>
  </g>

  <!-- Quality Control -->
  <g transform="translate(30, 200)">
    <text x="300" y="0" text-anchor="middle" class="label bold">Quality Control Process</text>
    <rect x="0" y="10" width="600" height="70" fill="#f7fafc" stroke="#e2e8f0" rx="4"/>
    
    <g transform="translate(20, 30)">
      <circle cx="15" cy="15" r="12" fill="#4299e1"/>
      <text x="15" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1</text>
      <text x="40" y="18" class="small">Template-based generation</text>
      
      <line x1="90" y1="15" x2="110" y2="15" stroke="#cbd5e0" stroke-width="2"/>
      
      <circle cx="135" cy="15" r="12" fill="#d69e2e"/>
      <text x="135" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="bold">2</text>
      <text x="160" y="18" class="small">Cross-model validation</text>
      
      <line x1="210" y1="15" x2="230" y2="15" stroke="#cbd5e0" stroke-width="2"/>
      
      <circle cx="255" cy="15" r="12" fill="#e53e3e"/>
      <text x="255" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="bold">3</text>
      <text x="280" y="18" class="small">Flag inconsistent items</text>
      
      <line x1="330" y1="15" x2="350" y2="15" stroke="#cbd5e0" stroke-width="2"/>
      
      <circle cx="375" cy="15" r="12" fill="#38a169"/>
      <text x="375" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="bold">4</text>
      <text x="400" y="18" class="small">Expert review & replace</text>
      
      <line x1="450" y1="15" x2="470" y2="15" stroke="#cbd5e0" stroke-width="2"/>
      
      <circle cx="495" cy="15" r="12" fill="#805ad5"/>
      <text x="495" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="bold">5</text>
      <text x="520" y="18" class="small">Balance preserved</text>
      
      <text x="0" y="45" class="small"><tspan font-weight="bold">12-18%</tspan> items replaced across grades</text>
    </g>
  </g>

  <!-- Dataset Stats -->
  <g transform="translate(650, 200)">
    <text x="130" y="0" text-anchor="middle" class="label bold">Key Statistics</text>
    <rect x="0" y="10" width="160" height="70" fill="#ebf8ff" border="#2c5282" stroke="#2c5282" rx="4"/>
    
    <text x="10" y="32" class="small"><tspan font-weight="bold">800</tspan> questions total</text>
    <text x="10" y="48" class="small"><tspan font-weight="bold">80+</tspan> skill domains</text>
    <text x="10" y="64" class="small"><tspan font-weight="bold">10K+</tspan> skill-question pairs</text>
  </g>

  <!-- Alignment -->
  <g transform="translate(30, 295)">
    <text x="300" y="0" text-anchor="middle" class="label bold">Curriculum Alignment</text>
    <rect x="0" y="10" width="600" height="50" fill="#f7fafc" stroke="#e2e8f0" rx="4"/>
    
    <text x="20" y="32" class="small"><tspan font-weight="bold">Standards:</tspan> Common Core State Standards (CCSS)</text>
    <text x="320" y="32" class="small"><tspan font-weight="bold">Annotation:</tspan> Semi-automatic with expert verification</text>
    <text x="20" y="50" class="small"><tspan font-weight="bold">Skills:</tspan> Direct mapping from curriculum standards to skill taxonomy</text>
  </g>
</svg>